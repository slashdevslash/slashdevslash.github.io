<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE STREAM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2d2d;
    --red-dim: #c41f1f;
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #666;
    --twitch: #9147ff;
    --youtube: #ff0000;
    --kick: #53fc18;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 52px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 16px;
  }

  .brand { display: flex; align-items: center; gap: 10px; }

  .live-badge {
    background: var(--red);
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 2px 8px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
    animation: pulse-badge 2s infinite;
  }
  .live-badge::before {
    content: '';
    width: 7px; height: 7px;
    background: #fff;
    border-radius: 50%;
    animation: blink 1s step-start infinite;
  }

  @keyframes blink { 50% { opacity: 0; } }
  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,45,45,0.5); }
    50%       { box-shadow: 0 0 0 6px rgba(255,45,45,0); }
  }

  .channel-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
  }

  /* ── TOGGLE ── */
  .toggle-wrap {
    display: flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px;
    gap: 2px;
  }

  .toggle-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 2px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    color: var(--text-dim);
  }
  .toggle-btn.active-twitch  { background: var(--twitch);  color: #fff; }
  .toggle-btn.active-youtube { background: var(--youtube);  color: #fff; }
  .toggle-btn.active-kick    { background: var(--kick);     color: #000; }

  /* ── DONATE ── */
  .donate-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 16px;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .donate-btn:hover { background: var(--red); color: #fff; }

  /* ── LAYOUT ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  .stream-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .stream-container {
    flex: 1;
    background: #000;
    position: relative;
    overflow: hidden;
  }
  .stream-container iframe {
    width: 100%; height: 100%;
    border: none;
    display: block;
  }

  .platform-tag {
    position: absolute;
    top: 12px; left: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 3px 8px;
    border-radius: 2px;
    pointer-events: none;
    opacity: 0.85;
    z-index: 5;
  }
  .platform-tag.twitch  { background: var(--twitch);  color: #fff; }
  .platform-tag.youtube { background: var(--youtube);  color: #fff; }
  .platform-tag.kick    { background: var(--kick);     color: #000; }

  /* ── OFFLINE OVERLAY ── */
  .offline-overlay {
    position: absolute;
    inset: 0;
    background: #050505;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
    transition: opacity 0.3s ease;
  }
  .offline-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .offline-word {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    letter-spacing: 18px;
    color: #1c1c1c;
    line-height: 1;
    user-select: none;
  }
  .offline-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .offline-show-btn {
    margin-top: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .offline-show-btn:hover { border-color: #555; color: var(--text); }

  /* ── CHAT ── */
  .chat-sidebar {
    width: 320px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    background: var(--surface);
  }
  .chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chat-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }
  .viewer-count {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .viewer-count::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
  }
  .chat-iframe-wrap { flex: 1; overflow: hidden; }
  .chat-iframe-wrap iframe { width: 100%; height: 100%; border: none; }

  /* ── DONATION MODAL ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    width: 480px;
    max-width: calc(100vw - 32px);
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    border-radius: 3px;
    transform: translateY(16px) scale(0.98);
    transition: transform 0.2s ease;
    overflow: hidden;
  }
  .modal-backdrop.open .modal { transform: translateY(0) scale(1); }

  .modal-head {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .modal-eyebrow {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 4px;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 3px;
    line-height: 1;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 2px 4px;
    transition: color 0.15s;
    flex-shrink: 0;
    margin-left: 12px;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }

  .modal-sub {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 18px;
    line-height: 1.6;
  }

  .incentives-list { display: flex; flex-direction: column; gap: 8px; }

  .incentive-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    transition: border-color 0.15s;
  }
  .incentive-row:hover { border-color: #444; }

  .incentive-amount {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--red);
    flex-shrink: 0;
    min-width: 52px;
    line-height: 1;
  }
  .incentive-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
  .incentive-label { font-size: 12px; font-weight: 500; line-height: 1.4; }

  .modal-footer {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-donate-link {
    display: block;
    width: 100%;
    padding: 13px;
    background: var(--red);
    color: #fff;
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .modal-donate-link:hover { background: var(--red-dim); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    body { overflow: auto; height: auto; }
    .main { flex-direction: column; }
    .chat-sidebar { width: 100%; height: 400px; border-left: none; border-top: 1px solid var(--border); }
    .stream-container { min-height: 56vw; }
    .channel-name { font-size: 17px; }
    .offline-word { font-size: 48px; letter-spacing: 10px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="live-badge">LIVE</div>
    <span class="channel-name">/dev/</span>
  </div>

  <div class="toggle-wrap">
    <button class="toggle-btn active-twitch" id="btn-twitch"  onclick="setPlatform('twitch')">Twitch</button>
    <button class="toggle-btn"              id="btn-youtube" onclick="setPlatform('youtube')">YouTube</button>
    <button class="toggle-btn"              id="btn-kick"    onclick="setPlatform('kick')">Kick</button>
  </div>

  <button class="donate-btn" onclick="openDonateModal()">♥ Donate</button>
</header>

<!-- DONATION MODAL -->
<div class="modal-backdrop" id="donate-modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="modal-eyebrow">Support the stream</div>
        <div class="modal-title">Donation Incentives</div>
      </div>
      <button class="modal-close" onclick="closeDonateModal()">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-sub">Donate any amount and unlock chaos. Donate that amount and it happens live.</p>
      <div class="incentives-list" id="incentives-list"></div>
    </div>
    <div class="modal-footer">
      <a class="modal-donate-link" href="https://example.com" target="_blank" rel="noopener">♥ Go to Donation Page</a>
    </div>
  </div>
</div>

<div class="main">
  <div class="stream-area">
    <div class="stream-container" id="stream-container">
      <iframe id="stream-frame" allowfullscreen allow="autoplay; fullscreen"></iframe>
      <span class="platform-tag twitch" id="platform-tag">TWITCH</span>

      <!-- OFFLINE OVERLAY — shown when no stream is detected -->
      <div class="offline-overlay hidden" id="offline-overlay">
        <div class="offline-word">OFFLINE</div>
        <div class="offline-sub">No stream detected</div>
        <button class="offline-show-btn" onclick="showStreamAnyway()">Show stream anyway</button>
      </div>
    </div>
  </div>

  <div class="chat-sidebar">
    <div class="chat-header">
      <span class="chat-title">STREAM CHAT</span>
      <span class="viewer-count">LIVE CHAT</span>
    </div>
    <div class="chat-iframe-wrap">
      <iframe id="chat-frame" sandbox="allow-storage-access-by-user-activation allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-modals"></iframe>
    </div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════════════════
  //  CONFIG — edit this block only
  // ═══════════════════════════════════════════════════════

  const TWITCH_CHANNEL  = 'your_twitch_channel';  // e.g. 'ninja'
  const YOUTUBE_CHANNEL = 'UCxxxxxxxxxxxxxxxx';   // YouTube channel ID
  const KICK_CHANNEL    = 'your_kick_channel';    // e.g. 'xqc'

  // How long (ms) to wait before showing OFFLINE if no playback signal is received.
  // Twitch & YouTube only — Kick handles its own offline screen natively.
  // Set to 0 to disable offline detection entirely.
  const OFFLINE_TIMEOUT_MS = 8000;

  // ─── DONATION INCENTIVES ────────────────────────────────
  // Add, remove, or edit rows below. { amount: '$X', label: 'What happens' }
  const INCENTIVES = [
    { amount: '$5',   label: 'Jumpscare sound effect plays' },
    { amount: '$10',  label: 'World explodes' },
    { amount: '$15',  label: 'Streamer has to do an impression' },
    { amount: '$25',  label: 'Drink water' },
    { amount: '$50',  label: 'Spin the chaos wheel' },
    { amount: '$75',  label: 'Play the worst song in the playlist' },
    { amount: '$100', label: 'Streamer blindfolded for 5 minutes' },
    { amount: '$250', label: 'Name an NPC after the donor' },
  ];
  // ═══════════════════════════════════════════════════════

  // Build incentives list
  const incList = document.getElementById('incentives-list');
  INCENTIVES.forEach(({ amount, label }) => {
    incList.innerHTML += `
      <div class="incentive-row">
        <span class="incentive-amount">${amount}</span>
        <div class="incentive-divider"></div>
        <span class="incentive-label">${label}</span>
      </div>`;
  });

  // ── Modal ──
  function openDonateModal() {
    document.getElementById('donate-modal').classList.add('open');
  }
  function closeDonateModal() {
    document.getElementById('donate-modal').classList.remove('open');
  }
  function handleBackdropClick(e) {
    if (e.target === document.getElementById('donate-modal')) closeDonateModal();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDonateModal(); });

  // ── Offline detection ──
  let currentPlatform = 'twitch';
  let offlineTimer    = null;
  let streamConfirmed = false;

  const hostname    = window.location.hostname || 'localhost';
  const overlay     = document.getElementById('offline-overlay');
  const streamFrame = document.getElementById('stream-frame');
  const chatFrame   = document.getElementById('chat-frame');
  const tag         = document.getElementById('platform-tag');

  function showOffline() {
    if (!streamConfirmed) overlay.classList.remove('hidden');
  }

  function confirmOnline() {
    streamConfirmed = true;
    clearTimeout(offlineTimer);
    overlay.classList.add('hidden');
  }

  // Dismiss overlay but don't treat as confirmed live
  function showStreamAnyway() {
    overlay.classList.add('hidden');
    clearTimeout(offlineTimer);
  }

  function startOfflineTimer() {
    clearTimeout(offlineTimer);
    streamConfirmed = false;
    // Kick manages its own offline UI — skip the timer for it
    if (currentPlatform === 'kick' || OFFLINE_TIMEOUT_MS === 0) return;
    offlineTimer = setTimeout(showOffline, OFFLINE_TIMEOUT_MS);
  }

  // Twitch embed fires postMessage events we can listen to
  // YouTube iframe API fires onStateChange with info=1 when playing
  window.addEventListener('message', e => {
    try {
      const data = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
      if (!data) return;

      const isTwitch  = currentPlatform === 'twitch';
      const isYoutube = currentPlatform === 'youtube';

      // Twitch: fires VIDEO_PLAY when the stream actually starts
      if (isTwitch && (data.eventName === 'VIDEO_PLAY' || data.namespace === 'player')) {
        confirmOnline();
      }
      // YouTube: state 1 = playing
      if (isYoutube && data.event === 'onStateChange' && data.info === 1) {
        confirmOnline();
      }
    } catch (_) {}
  });

  function setPlatform(platform) {
    currentPlatform = platform;

    // Buttons
    document.getElementById('btn-twitch').className  = 'toggle-btn' + (platform === 'twitch'  ? ' active-twitch'  : '');
    document.getElementById('btn-youtube').className = 'toggle-btn' + (platform === 'youtube' ? ' active-youtube' : '');
    document.getElementById('btn-kick').className    = 'toggle-btn' + (platform === 'kick'    ? ' active-kick'    : '');

    // Platform badge
    tag.className   = 'platform-tag ' + platform;
    tag.textContent = platform.toUpperCase();

    // Hide overlay while new stream loads
    overlay.classList.add('hidden');

    if (platform === 'twitch') {
      streamFrame.src = `https://player.twitch.tv/?channel=${TWITCH_CHANNEL}&parent=${hostname}`;
      chatFrame.src   = `https://www.twitch.tv/embed/${TWITCH_CHANNEL}/chat?darkpopout&parent=${hostname}`;
      startOfflineTimer();

    } else if (platform === 'youtube') {
      streamFrame.src = `https://www.youtube.com/embed/live_stream?channel=${YOUTUBE_CHANNEL}&autoplay=1&enablejsapi=1`;
      chatFrame.src   = `https://www.youtube.com/live_chat?channel=${YOUTUBE_CHANNEL}&embed_domain=${hostname}`;
      startOfflineTimer();

    } else if (platform === 'kick') {
      // Kick shows its own offline screen — no timer needed
      streamFrame.src = `https://player.kick.com/${KICK_CHANNEL}?autoplay=true`;
      chatFrame.src   = `https://kick.com/${KICK_CHANNEL}/chatroom`;
    }
  }

  setPlatform('twitch');
</script>
</body>
</html>
